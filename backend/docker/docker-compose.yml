services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secure_exam_portal
      POSTGRES_USER: secure_exam_user
      POSTGRES_PASSWORD: secure_exam_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secure_exam_user -d secure_exam_portal"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://secure_exam_user:secure_exam_password@db:5432/secure_exam_portal
      CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ..:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
